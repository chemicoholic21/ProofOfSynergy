[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"

[rpc_endpoints]
monad_testnet = "${MONAD_RPC_URL}"

[etherscan]
# Monad testnet explorer verification (Blockscout/Sourcify-style).
monad_testnet = { key = "${EXPLORER_API_KEY}", url = "${EXPLORER_API_URL}", chain = 10143 }
